<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Avatar Creator 2</title>
  <link rel="icon" type="image/png" href="./images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <button
    class="creator-embed-close"
    type="button"
    data-creator-close-request
    aria-label="Close Avatar Creator"

    <div class="ac2-host-frame">
    <div class="ac2-host-frame-viewport">
      <main class="landing-shell">
    <section class="landing">
      <header class="topbar">
        <div class="top-actions">
          <div class="hamburger-wrap">
            <button class="menu-btn" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="top-dropdown">
              <span></span>
              <span></span>
              <span></span>
            </button>
            <nav id="top-dropdown" class="dropdown-menu" aria-label="Avatar options">
              <a class="ra2-btn" href="#">Realisitc Avatar</a>
              <a class="mkt-btn" href="https://market.viverse.com/zh-TW/?_gl=1*15khbrs*_gcl_au*MTUyODIxNjg5Mi4xNzY4OTg5Mjg1LjQzOTM2NTE3NS4xNzcxOTUxNDA3LjE3NzE5NTE0MDY.*_ga*MTc2MDg1NDkzMC4xNzUxNDc4NDQ0*_ga_DGG9JZZMCG*czE3NzI5MjIyMzckbzI0MyRnMSR0MTc3MjkyMzQzNiRqNTkkbDAkaDA." target="_blank" rel="noopener noreferrer">Marketplace</a>
              <div class="dropdown-inline-action">
                <button class="uploadvrm-btn" type="button" data-upload-vrm-trigger>Upload VRM</button>
                <div class="menu-info-wrap creator-info-wrap">
                  <a class="menu-info-btn info-btn" href="../vrmguide/vrmguide.html" target="_blank" rel="noopener noreferrer" aria-label="What is VRM?">
                    <span aria-hidden="true">i</span>
                  </a>
                  <span class="menu-info-popup creator-info-popup" role="status">What is VRM?</span>
                </div>
              </div>
            </nav>
          </div>
        </div>
      </header>

      <section class="hero">
        <section class="hero-copy">
          <h1>
            <span class="title-main">Create Your</span>
            <span class="title-gradient" data-text="Unique Character">Unique Character</span>
          </h1>
          <p class="desc">
            Customize style, colors, and details - no two avatars look the same.
          </p>
          <div class="cta-row">
            <div class="cta-slot">
              <button id="cta" class="creator-cta" type="button">Create Now!</button>
              <div id="loading-status" aria-live="polite">Loading... 0%</div>

            <div class="creator-inline-action">
              <button class="creator-upload-cta" type="button" data-upload-vrm-trigger>Upload VRM</button>
              <div class="creator-info-wrap">
                <a
                  class="info-btn"
                  href="../vrmguide/vrmguide.html"
                  target="_blank"
                  rel="noopener noreferrer"
                  aria-label="What is VRM?"
                >
                  <span aria-hidden="true">i</span>
                </a>
                <span class="creator-info-popup" role="status">What is VRM?</span>
              </div>
            </div>
          </div>
        </section>

        <section class="hero-visual" aria-label="Creative hero visual">
          <div class="blob blob-a"></div>
          <div class="blob blob-b"></div>
          <div class="blob blob-c"></div>
          <div class="hero-carousel" aria-live="polite">
            <img class="hero-slide is-active" src="./images/Yaya_Collection_print_v2.png" alt="Yaya collection character visual">
            <img class="hero-slide" src="./images/Michael_print_Collection.png" alt="Michael collection character visual">
            <img class="hero-slide" src="./images/Iris.png" alt="Iris character visual">
            <img class="hero-slide" src="./images/ca2_suit_tb_01.png" alt="Suit character visual">
            <img class="hero-slide" src="./images/ca2_suit_tb_05.png" alt="Suit character visual 05">
          </div>

    </section>
  </main>

  <div id="loading-overlay" class="loading-overlay" aria-hidden="true">
    <div id="caption-wrapper">
      <div id="loading-container">
        <div id="loading-bar"></div>
      </div>
    </div>
  </div>

  <div id="player-version">v2.1.872</div>

        <div id="container" aria-hidden="true">
    <canvas id="game-canvas"></canvas>
  </div>
    </div>
  </div>

  <input id="upload-vrm-input" type="file" accept=".vrm,model/vrm" hidden>
  <div id="creation-confirm-overlay" class="confirm-overlay" hidden aria-hidden="true">
    <div class="confirm-panel" role="dialog" aria-modal="true" aria-labelledby="creation-confirm-title">
      <div class="confirm-panel-header">
        <div class="confirm-panel-copy">
          <h2 id="creation-confirm-title">Preparing</h2>
          <p id="creation-confirm-message">Your avatar will be ready soon.</p>
        </div>
      </div>
      <div class="confirm-progress-track" aria-hidden="true">
        <div id="creation-confirm-progress-bar" class="confirm-progress-bar"></div>
      </div>
      <div class="confirm-progress-meta">
        <span id="creation-confirm-progress-text">0%</span>
        <span id="creation-confirm-progress-detail">Preparing upload...</span>
      </div>
      <div class="confirm-actions">
        <button class="confirm-action-button" type="button" data-confirm-hide-panel>Close Panel</button>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const startButton = document.getElementById('cta');
      const creatorCloseRequestButton = document.querySelector('[data-creator-close-request]');
      const uploadVrmTriggers = Array.prototype.slice.call(document.querySelectorAll('[data-upload-vrm-trigger]'));
      const uploadVrmInput = document.getElementById('upload-vrm-input');
      const loadingOverlay = document.getElementById('loading-overlay');
      const loadingBar = document.getElementById('loading-bar');
      const loadingStatus = document.getElementById('loading-status');
      const landingShell = document.querySelector('.landing-shell');
      const container = document.getElementById('container');
      const frameViewport = document.querySelector('.ac2-host-frame-viewport');
      const creationConfirmOverlay = document.getElementById('creation-confirm-overlay');
      const creationConfirmHidePanelButton = creationConfirmOverlay
        ? creationConfirmOverlay.querySelector('[data-confirm-hide-panel]')
        : null;
      const creationConfirmMessage = document.getElementById('creation-confirm-message');
      const creationConfirmProgressBar = document.getElementById('creation-confirm-progress-bar');
      const creationConfirmProgressText = document.getElementById('creation-confirm-progress-text');
      const creationConfirmProgressDetail = document.getElementById('creation-confirm-progress-detail');
      const canvasElement = document.getElementById('game-canvas');
      const versionBadge = document.getElementById('player-version');
      const unityLoaderUrl = './Build/viverse-avatar-creator.loader.js';
      const unityFrameworkUrl = './Build/viverse-avatar-creator.framework.js.unityweb';
      const unityCodeUrl = './Build/viverse-avatar-creator.wasm.unityweb';
      const unityDataUrl = './Build/viverse-avatar-creator.data.unityweb';
      const START_BUTTON_TEXT = 'Create Now!';
      const LOADING_STATUS_TEXT = 'Loading...';
      const LOADING_PROGRESS_SUFFIX = '%';
      const UPLOAD_PANEL_TITLE = 'Preparing';
      const UPLOAD_PANEL_MESSAGE = 'Your avatar will be ready soon.';
      const UPLOAD_FAILED_TITLE = 'Avatar Upload Failed';
      const UPLOAD_FAILED_MESSAGE = 'Please refresh the page and try again.';
      const RUNTIME_EXPORTER_GAME_OBJECT = 'RuntimeClothingMergerAndExporter';
      const RUNTIME_EXPORTER_RESTART_METHOD = 'RestartCreatorRuntime';
      const isEmbedded = window.parent && window.parent !== window;
      const AC2_PROTOCOL_VERSION = '1.0';
      const EXTERNAL_UPLOAD_PANEL_CONFIG = {
        enabled: true,
        title: UPLOAD_PANEL_TITLE,
        message: UPLOAD_PANEL_MESSAGE,
        gradient: 'linear-gradient(102deg, #4f6df2, #7a67ea 50%, #b566d8)',
        background: 'linear-gradient(90deg, #060d36 0%, #150d3a 50%, #3c1556 100%)',
        border: '1px solid rgba(255, 255, 255, 0.16)',
        track: 'rgba(255, 255, 255, 0.14)'
      };
      const DEFAULT_HOST_FRAME_STYLE = {
        source: 'ac2',
        placement: 'center',
        breakpoint: 960,
        panelWidth: 1280,
        panelHeight: 780,
        panelRadius: 28,
        mobilePanelWidth: null,
        mobilePanelHeight: 780,
        mobilePanelRadius: 22,
        padding: {
          top: 32,
          right: 32,
          bottom: 32,
          left: 32
        },
        mobilePadding: {
          top: 16,
          right: 0,
          bottom: 16,
          left: 0
        },
        backdrop: 'rgba(4, 7, 20, 0.58)',
        backdropFilter: 'blur(12px)',
        panelBackground: 'linear-gradient(90deg, #060d36 0%, #150d3a 50%, #3c1556 100%)',
        frameBackground: '#050814',
        border: '1px solid rgba(255, 255, 255, 0.18)'
      };
      const urlParams = new URLSearchParams(window.location.search);
      const DEFAULT_MAX_UPLOAD_BYTES = 100 * 1024 * 1024;
      const DEFAULT_CONTENT_TYPE = 'model/vrm';

      let canvas = canvasElement;
      let unityReady = false;
      let enterRequested = false;
      let hasEnteredUnity = false;
      let unityLoadStarted = false;
      let revealFinalizeTimerId = null;
      let revealOrigin = null;
      let unityRuntimeReady = false;
      let unityRuntimePreloadPromise = null;
      let unityInstancePromise = null;
      let unityInstance = null;
      let hostContext = null;
      let hostOrigin = '*';
      let hostSource = null;
      let hostFrameStyle = DEFAULT_HOST_FRAME_STYLE;
      let standaloneConfig = null;
      let ac2ApiBase = '';
      let ac2Session = null;
      let uploadOverlayState = {
        active: false,
        hidden: false,
        restartIssued: false,
        errorMessage: '',
        fileName: 'avatar.vrm',
        loadedBytes: 0,
        totalBytes: 0
      };

      try {
        if (document.referrer) {
          hostOrigin = new URL(document.referrer).origin;
        }
      } catch (error) {
        console.warn('Unable to resolve host origin from referrer.', error);
      }

      if (isEmbedded) {
        document.body.classList.add('is-embedded');
      }

      if (versionBadge) {
        versionBadge.textContent = 'v2.1.872';
      }

      function parseStandaloneConfig() {
        if (!window.location.hash || !window.location.hash.includes('ac2-standalone=')) {
          return null;
        }

        const hash = window.location.hash.replace(/^#/, '');
        const params = new URLSearchParams(hash);
        const raw = params.get('ac2-standalone');
        if (!raw) {
          return null;
        }

        try {
          const json = decodeURIComponent(escape(atob(decodeURIComponent(raw))));
          return JSON.parse(json);
        } catch (error) {
          console.warn('Unable to parse standalone AC2 config.', error);
          return null;
        }
      }

      standaloneConfig = parseStandaloneConfig();
      if (standaloneConfig && typeof standaloneConfig.apiBase === 'string') {
        ac2ApiBase = standaloneConfig.apiBase;
        ac2Session = standaloneConfig.session || null;
        hostContext = {
          requestId: null,
          payload: ac2Session || {}
        };
        if (standaloneConfig.uiMode) {
          updateUiMode(standaloneConfig.uiMode);
        }
      }

      function cloneFrameInsets(source, fallback) {
        const next = source || {};
        return {
          top: Number.isFinite(next.top) ? next.top : fallback.top,
          right: Number.isFinite(next.right) ? next.right : fallback.right,
          bottom: Number.isFinite(next.bottom) ? next.bottom : fallback.bottom,
          left: Number.isFinite(next.left) ? next.left : fallback.left
        };
      }

      function normalizeFrameStyle(frameStyle) {
        const next = frameStyle || {};
        const placement = typeof next.placement === 'string' && next.placement
          ? next.placement
          : DEFAULT_HOST_FRAME_STYLE.placement;
        const breakpoint = Number.isFinite(next.breakpoint) ? next.breakpoint : DEFAULT_HOST_FRAME_STYLE.breakpoint;
        const panelWidth = Number.isFinite(next.panelWidth) ? next.panelWidth : DEFAULT_HOST_FRAME_STYLE.panelWidth;
        const panelHeight = Number.isFinite(next.panelHeight) ? next.panelHeight : DEFAULT_HOST_FRAME_STYLE.panelHeight;
        const panelRadius = Number.isFinite(next.panelRadius) ? next.panelRadius : DEFAULT_HOST_FRAME_STYLE.panelRadius;
        const mobilePanelWidth = Number.isFinite(next.mobilePanelWidth) ? next.mobilePanelWidth : DEFAULT_HOST_FRAME_STYLE.mobilePanelWidth;
        const mobilePanelHeight = Number.isFinite(next.mobilePanelHeight) ? next.mobilePanelHeight : DEFAULT_HOST_FRAME_STYLE.mobilePanelHeight;
        const mobilePanelRadius = Number.isFinite(next.mobilePanelRadius)
          ? next.mobilePanelRadius
          : DEFAULT_HOST_FRAME_STYLE.mobilePanelRadius;

        return {
          source: typeof next.source === 'string' ? next.source : DEFAULT_HOST_FRAME_STYLE.source,
          placement: placement,
          breakpoint: breakpoint,
          panelWidth: panelWidth,
          panelHeight: panelHeight,
          panelRadius: panelRadius,
          mobilePanelWidth: mobilePanelWidth,
          mobilePanelHeight: mobilePanelHeight,
          mobilePanelRadius: mobilePanelRadius,
          padding: cloneFrameInsets(next.padding, DEFAULT_HOST_FRAME_STYLE.padding),
          mobilePadding: cloneFrameInsets(next.mobilePadding, DEFAULT_HOST_FRAME_STYLE.mobilePadding),
          backdrop: typeof next.backdrop === 'string' ? next.backdrop : DEFAULT_HOST_FRAME_STYLE.backdrop,
          backdropFilter: typeof next.backdropFilter === 'string' ? next.backdropFilter : DEFAULT_HOST_FRAME_STYLE.backdropFilter,
          panelBackground: typeof next.panelBackground === 'string' ? next.panelBackground : DEFAULT_HOST_FRAME_STYLE.panelBackground,
          frameBackground: typeof next.frameBackground === 'string' ? next.frameBackground : DEFAULT_HOST_FRAME_STYLE.frameBackground,
          border: typeof next.border === 'string' ? next.border : DEFAULT_HOST_FRAME_STYLE.border
        };
      }

      function applyFrameStyle(frameStyle) {
        hostFrameStyle = normalizeFrameStyle(frameStyle);
        document.body.dataset.ac2FramePlacement = hostFrameStyle.placement;
        document.body.style.setProperty('--ac2-host-frame-breakpoint', hostFrameStyle.breakpoint + 'px');
        document.body.style.setProperty('--ac2-host-frame-width', hostFrameStyle.panelWidth + 'px');
        document.body.style.setProperty('--ac2-host-frame-height', hostFrameStyle.panelHeight + 'px');
        document.body.style.setProperty('--ac2-host-frame-radius', hostFrameStyle.panelRadius + 'px');
        document.body.style.setProperty('--ac2-host-frame-mobile-width', hostFrameStyle.mobilePanelWidth ? hostFrameStyle.mobilePanelWidth + 'px' : 'var(--ac2-host-frame-width)');
        document.body.style.setProperty('--ac2-host-frame-mobile-height', hostFrameStyle.mobilePanelHeight ? hostFrameStyle.mobilePanelHeight + 'px' : 'var(--ac2-host-frame-height)');
        document.body.style.setProperty('--ac2-host-frame-mobile-radius', hostFrameStyle.mobilePanelRadius + 'px');
        document.body.style.setProperty('--ac2-host-frame-padding-top', hostFrameStyle.padding.top + 'px');
        document.body.style.setProperty('--ac2-host-frame-padding-right', hostFrameStyle.padding.right + 'px');
        document.body.style.setProperty('--ac2-host-frame-padding-bottom', hostFrameStyle.padding.bottom + 'px');
        document.body.style.setProperty('--ac2-host-frame-padding-left', hostFrameStyle.padding.left + 'px');
        document.body.style.setProperty('--ac2-host-frame-mobile-padding-top', hostFrameStyle.mobilePadding.top + 'px');
        document.body.style.setProperty('--ac2-host-frame-mobile-padding-right', hostFrameStyle.mobilePadding.right + 'px');
        document.body.style.setProperty('--ac2-host-frame-mobile-padding-bottom', hostFrameStyle.mobilePadding.bottom + 'px');
        document.body.style.setProperty('--ac2-host-frame-mobile-padding-left', hostFrameStyle.mobilePadding.left + 'px');
        document.body.style.setProperty('--ac2-host-frame-backdrop', hostFrameStyle.backdrop);
        document.body.style.setProperty('--ac2-host-frame-backdrop-filter', hostFrameStyle.backdropFilter);
        document.body.style.setProperty('--ac2-host-frame-panel-background', hostFrameStyle.panelBackground);
        document.body.style.setProperty('--ac2-host-frame-background', hostFrameStyle.frameBackground);
        document.body.style.setProperty('--ac2-host-frame-border', hostFrameStyle.border);
      }

      function getFrameStylePayload() {
        return {
          source: hostFrameStyle.source,
          placement: hostFrameStyle.placement,
          breakpoint: hostFrameStyle.breakpoint,
          panelWidth: hostFrameStyle.panelWidth,
          panelHeight: hostFrameStyle.panelHeight,
          panelRadius: hostFrameStyle.panelRadius,
          mobilePanelWidth: hostFrameStyle.mobilePanelWidth,
          mobilePanelHeight: hostFrameStyle.mobilePanelHeight,
          mobilePanelRadius: hostFrameStyle.mobilePanelRadius,
          padding: {
            top: hostFrameStyle.padding.top,
            right: hostFrameStyle.padding.right,
            bottom: hostFrameStyle.padding.bottom,
            left: hostFrameStyle.padding.left
          },
          mobilePadding: {
            top: hostFrameStyle.mobilePadding.top,
            right: hostFrameStyle.mobilePadding.right,
            bottom: hostFrameStyle.mobilePadding.bottom,
            left: hostFrameStyle.mobilePadding.left
          },
          backdrop: hostFrameStyle.backdrop,
          backdropFilter: hostFrameStyle.backdropFilter,
          panelBackground: hostFrameStyle.panelBackground,
          frameBackground: hostFrameStyle.frameBackground,
          border: hostFrameStyle.border
        };
      }

      function setLoadingStatus(progress) {
        if (!loadingStatus) {
          return;
        }

        const percent = Math.max(0, Math.min(100, Math.round(progress * 100)));
        loadingStatus.textContent = LOADING_STATUS_TEXT + ' ' + percent + LOADING_PROGRESS_SUFFIX;
      }

      function progressHandler(progress) {
        loadingBar.style.width = (progress * 100) + '%';
        setLoadingStatus(progress);
      }

      function getHostViewportSize() {
        if (isEmbedded && frameViewport) {
          return {
            width: frameViewport.clientWidth || window.innerWidth,
            height: frameViewport.clientHeight || window.innerHeight
          };
        }

        return {
          width: window.innerWidth,
          height: window.innerHeight
        };
      }

      function onResize() {
        const viewportSize = getHostViewportSize();
        setRevealOrigin();
        canvas.style.width = viewportSize.width + 'px';
        canvas.style.height = viewportSize.height + 'px';
      }

      function setRevealOrigin() {
        const viewportSize = getHostViewportSize();
        revealOrigin = {
          x: viewportSize.width / 2,
          y: viewportSize.height / 2
        };

        const maxHorizontal = Math.max(revealOrigin.x, viewportSize.width - revealOrigin.x);
        const maxVertical = Math.max(revealOrigin.y, viewportSize.height - revealOrigin.y);
        const finalRadius = Math.ceil(Math.sqrt((maxHorizontal * maxHorizontal) + (maxVertical * maxVertical)));

        document.body.style.setProperty('--unity-reveal-x', revealOrigin.x + 'px');
        document.body.style.setProperty('--unity-reveal-y', revealOrigin.y + 'px');
        document.body.style.setProperty('--unity-reveal-end-radius', finalRadius + 'px');
      }

      function showLoadingOverlay() {
        document.body.classList.add('show-loading-overlay');
        loadingOverlay.setAttribute('aria-hidden', 'false');
        setLoadingStatus(0);
      }

      function hideLoadingOverlay() {
        document.body.classList.remove('show-loading-overlay');
        loadingOverlay.setAttribute('aria-hidden', 'true');
      }

      function formatUploadBytes(bytes) {
        if (!Number.isFinite(bytes) || bytes <= 0) {
          return '0 B';
        }

        const units = ['B', 'KB', 'MB', 'GB'];
        let value = bytes;
        let unitIndex = 0;
        while (value >= 1024 && unitIndex < units.length - 1) {
          value /= 1024;
          unitIndex += 1;
        }

        const rounded = value >= 10 || unitIndex === 0 ? Math.round(value) : value.toFixed(1);
        return rounded + ' ' + units[unitIndex];
      }

      function getUploadPercent() {
        if (!uploadOverlayState.active) {
          return 0;
        }

        if (!Number.isFinite(uploadOverlayState.totalBytes) || uploadOverlayState.totalBytes <= 0) {
          return 0;
        }

        return Math.max(0, Math.min(100, Math.round((uploadOverlayState.loadedBytes / uploadOverlayState.totalBytes) * 100)));
      }

      function renderUploadOverlay() {
        if (!creationConfirmOverlay) {
          return;
        }

        const shouldShow = uploadOverlayState.active && !uploadOverlayState.hidden;
        creationConfirmOverlay.hidden = !shouldShow;
        creationConfirmOverlay.setAttribute('aria-hidden', shouldShow ? 'false' : 'true');

        if (!shouldShow) {
          emitConfirmState(false);
          return;
        }

        const percent = getUploadPercent();
        const isError = !!uploadOverlayState.errorMessage;
        const panelMessage = isError ? UPLOAD_FAILED_MESSAGE : UPLOAD_PANEL_MESSAGE;
        const panelTitle = isError ? UPLOAD_FAILED_TITLE : UPLOAD_PANEL_TITLE;
        if (creationConfirmHidePanelButton) {
          creationConfirmHidePanelButton.textContent = isError && isMobileUploadPanel()
            ? 'Refresh'
            : (isError ? 'Close Panel' : 'Hide Panel');
        }
        const titleElement = document.getElementById('creation-confirm-title');
        if (titleElement) {
          titleElement.textContent = panelTitle;
        }
        if (creationConfirmMessage) {
          creationConfirmMessage.textContent = panelMessage;
        }
        if (creationConfirmProgressBar) {
          creationConfirmProgressBar.style.width = percent + '%';
        }
        if (creationConfirmProgressText) {
          creationConfirmProgressText.textContent = percent + '%';
        }
        if (creationConfirmProgressDetail) {
          creationConfirmProgressDetail.textContent = formatUploadBytes(uploadOverlayState.loadedBytes) + ' / ' + formatUploadBytes(uploadOverlayState.totalBytes);
        }
        emitConfirmState(true);
      }

      function resetUploadOverlayState() {
        uploadOverlayState = {
          active: false,
          hidden: false,
          restartIssued: false,
          errorMessage: '',
          fileName: 'avatar.vrm',
          loadedBytes: 0,
          totalBytes: 0
        };
        renderUploadOverlay();
      }

      function resetToLanding(options) {
        const nextOptions = options || {};
        enterRequested = false;
        hasEnteredUnity = false;

        if (revealFinalizeTimerId !== null) {
          window.clearTimeout(revealFinalizeTimerId);
          revealFinalizeTimerId = null;
        }

        hideLoadingOverlay();
        setLoadingStatus(0);
        if (startButton) {
          startButton.textContent = START_BUTTON_TEXT;
        }
        if (!nextOptions.preserveUploadUi) {
          resetUploadOverlayState();
        }
        document.body.classList.remove('enter-unity');
        document.body.classList.remove('unity-visible');
        landingShell.setAttribute('aria-hidden', 'false');
        container.setAttribute('aria-hidden', 'true');
        loadingBar.style.width = '0%';
        canvas.style.width = '0px';
        canvas.style.height = '0px';
        notifyParentEvent('landing');
      }

      function restartUnityRuntime(options) {
        const nextOptions = options || {};
        resetToLanding({
          preserveUploadUi: nextOptions.preserveUploadUi
        });

        if (!unityInstance || typeof unityInstance.SendMessage !== 'function') {
          return false;
        }

        unityInstance.SendMessage(RUNTIME_EXPORTER_GAME_OBJECT, RUNTIME_EXPORTER_RESTART_METHOD);
        return true;
      }

      function ensureUploadRuntimeRestarted() {
        if (uploadOverlayState.restartIssued) {
          return;
        }

        uploadOverlayState.restartIssued = true;
        restartUnityRuntime({
          preserveUploadUi: true
        });
      }

      function isMobileUploadPanel() {
        const uiMode = document.body.dataset.ac2UiMode || urlParams.get('uiMode') || '';
        return uiMode === 'mobile';
      }

      function handleUploadHideRequest() {
        if (!uploadOverlayState.active) {
          return;
        }

        if (uploadOverlayState.errorMessage) {
          if (isMobileUploadPanel()) {
            window.location.reload();
            return;
          }

          ensureUploadRuntimeRestarted();
          resetUploadOverlayState();
          requestParentClose({
            reason: 'upload-failed-close',
            restoreDefaultFrameStyle: true
          });
          return;
        }

        uploadOverlayState.hidden = true;
        renderUploadOverlay();
        requestParentClose({
          reason: 'upload-hidden',
          restoreDefaultFrameStyle: true
        });
      }

      function enterUnity() {
        if (!unityReady || hasEnteredUnity) return;
        hasEnteredUnity = true;
        hideLoadingOverlay();
        notifyParentEvent('unity-started');
        document.body.classList.add('enter-unity');
        container.setAttribute('aria-hidden', 'false');
        if (revealFinalizeTimerId !== null) {
          window.clearTimeout(revealFinalizeTimerId);
        }
        revealFinalizeTimerId = window.setTimeout(function () {
          document.body.classList.add('unity-visible');
          landingShell.setAttribute('aria-hidden', 'true');
        }, 1050);
        onResize();
      }

      function queueUnityEntry() {
        setRevealOrigin();
        enterRequested = true;
        if (unityReady) {
          enterUnity();
          return;
        }
        showLoadingOverlay();
        startUnityLoad();
      }

      (() => {
        const wrap = document.querySelector('.hamburger-wrap');
        if (!wrap) return;
        const button = wrap.querySelector('.menu-btn');
        const menu = wrap.querySelector('.dropdown-menu');

        function closeMenu() {
          wrap.classList.remove('open');
          button.setAttribute('aria-expanded', 'false');
          button.setAttribute('aria-label', 'Open menu');
        }

        button.addEventListener('click', function (event) {
          event.stopPropagation();
          const isOpen = wrap.classList.toggle('open');
          button.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
          button.setAttribute('aria-label', isOpen ? 'Close menu' : 'Open menu');
        });

        document.addEventListener('click', function (event) {
          if (!wrap.contains(event.target)) closeMenu();
        });

        document.addEventListener('keydown', function (event) {
          if (event.key === 'Escape') closeMenu();
        });

        menu.addEventListener('click', closeMenu);
      })();

      function getHostMessageTarget() {
        if (window.parent && window.parent !== window) {
          return window.parent;
        }

        if (window.opener && !window.opener.closed) {
          return window.opener;
        }

        return null;
      }

      function notifyParent(message) {
        const target = getHostMessageTarget();
        if (!target) {
          return;
        }

        target.postMessage(message, hostOrigin);
      }

      function createMessage(type, payload) {
        const requestId = hostContext && hostContext.requestId ? hostContext.requestId : null;
        return {
          type: 'ac2:' + type,
          protocol: 'ac2',
          version: AC2_PROTOCOL_VERSION,
          requestId: requestId,
          payload: payload || {}
        };
      }

      function notifyParentEvent(type, payload) {
        notifyParent(createMessage(type, payload));
      }

      function emitConfirmState(isOpen) {
        emitToParent('confirm-state', {
          open: Boolean(isOpen)
        });
      }

      function emitUiConfig() {
        notifyParentEvent('ui-config', {
          uiMode: document.body.dataset.ac2UiMode || urlParams.get('uiMode') || 'modal',
          frameStyle: getFrameStylePayload(),
          capabilities: {
            closeRequest: true,
            frameStyleBridge: true,
            uiConfigBridge: true
          }
        });
      }

      function emitExternalUploadPanelConfig() {
        notifyParentEvent('external-upload-panel-config', EXTERNAL_UPLOAD_PANEL_CONFIG);
      }

      function notifyLegacyEvent(type, payload) {
        switch (type) {
          case 'landing':
            notifyParent({ type: 'avatar-creator-landing' });
            return;
          case 'unity-started':
            notifyParent({ type: 'avatar-creator-unity-started' });
            return;
          case 'close-request':
            notifyParent({ type: 'avatar-creator-close-request' });
            return;
          case 'upload-error':
            notifyParent({
              type: 'avatar-upload-error',
              message: payload && payload.message ? payload.message : 'VRM upload failed.'
            });
            return;
          case 'upload-vrm':
            notifyParent({
              type: 'avatar-upload-vrm',
              file: payload && payload.file ? payload.file : null
            });
            return;
          case 'avatar-created':
            notifyParent({
              method: 'avatar-created',
              payload: payload || {}
            });
            return;
          default:
            return;
        }
      }

      function emitToParent(type, payload) {
        notifyParentEvent(type, payload);
        notifyLegacyEvent(type, payload);
      }

      function parsePayload(payload) {
        if (typeof payload !== 'string') {
          return payload;
        }

        try {
          return JSON.parse(payload);
        } catch (error) {
          console.warn('Unable to parse AC2 payload JSON.', error);
          return null;
        }
      }

      function bytesFromBase64(value) {
        if (typeof value !== 'string' || !value) {
          return null;
        }

        const base64 = value.includes(',') ? value.split(',').pop() : value;
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);

        for (let index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index);
        }

        return bytes;
      }

      function bytesFromValue(value) {
        if (!value) {
          return null;
        }

        if (value instanceof Uint8Array) {
          return value;
        }

        if (value instanceof ArrayBuffer) {
          return new Uint8Array(value);
        }

        if (Array.isArray(value)) {
          return new Uint8Array(value);
        }

        if (typeof value === 'string') {
          return bytesFromBase64(value);
        }

        return null;
      }

      function toVrmFile(payload, options) {
        const nextOptions = options || {};
        const maxUploadBytes = Number.isFinite(nextOptions.maxUploadBytes)
          ? nextOptions.maxUploadBytes
          : DEFAULT_MAX_UPLOAD_BYTES;
        let parsedPayload = parsePayload(payload);

        if (parsedPayload && parsedPayload.file instanceof File) {
          return parsedPayload.file;
        }

        if (!parsedPayload || !parsedPayload.avatarBytes) {
          const fallbackBytes = bytesFromValue(parsedPayload && (
            parsedPayload.vrmBytes
            || parsedPayload.bytes
            || parsedPayload.avatarBase64
            || parsedPayload.vrmBase64
            || parsedPayload.base64
            || parsedPayload.dataUrl
          ));

          if (!fallbackBytes) {
            return null;
          }

          parsedPayload = Object.assign({}, parsedPayload, {
            avatarBytes: fallbackBytes
          });
        }

        const fileName = typeof parsedPayload.fileName === 'string' && parsedPayload.fileName.trim()
          ? parsedPayload.fileName.trim()
          : 'avatar.vrm';
        const contentType = typeof parsedPayload.contentType === 'string' && parsedPayload.contentType.trim()
          ? parsedPayload.contentType.trim()
          : DEFAULT_CONTENT_TYPE;
        const avatarBytes = bytesFromValue(parsedPayload.avatarBytes);

        if (!avatarBytes) {
          return null;
        }

        if (avatarBytes.byteLength > maxUploadBytes) {
          throw new Error('VRM file is too large.');
        }

        return new File([avatarBytes], fileName, { type: contentType });
      }

      function parseErrorMessage(text, fallback) {
        if (!text) {
          return fallback;
        }

        try {
          const payload = JSON.parse(text);
          if (payload && typeof payload.message === 'string' && payload.message.trim()) {
            return payload.message.trim();
          }
        } catch (error) {
          // Ignore malformed JSON and fall back to the response text.
        }

        return text.trim() || fallback;
      }

      function uploadToSignedUrl(upload, file, options) {
        const nextOptions = options || {};
        return new Promise(function (resolve, reject) {
          const request = new XMLHttpRequest();
          request.open(upload.method || 'PUT', upload.url, true);
          request.withCredentials = false;

          Object.entries(upload.headers || {}).forEach(function (entry) {
            request.setRequestHeader(entry[0], entry[1]);
          });

          request.upload.addEventListener('progress', function (event) {
            if (typeof nextOptions.onProgress === 'function') {
              nextOptions.onProgress({
                loaded: event.loaded,
                total: event.lengthComputable ? event.total : file.size || 0
              });
            }
          });

          request.addEventListener('load', function () {
            if (request.status < 200 || request.status >= 300) {
              reject(new Error(parseErrorMessage(request.responseText, 'VRM upload failed (' + request.status + ')')));
              return;
            }

            resolve({
              status: request.status,
              etag: request.getResponseHeader('etag') || request.getResponseHeader('ETag') || ''
            });
          });

          request.addEventListener('error', function () {
            reject(new Error('VRM upload failed.'));
          });

          request.addEventListener('abort', function () {
            reject(new Error('VRM upload aborted.'));
          });

          request.send(file);
        });
      }

      function ensureAc2Session() {
        if (ac2Session && ac2Session.sessionToken) {
          return Promise.resolve(ac2Session);
        }

        return Promise.reject(new Error('Missing AC2 session.'));
      }

      function getAc2AuthHeaders(extraHeaders) {
        const token = ac2Session && ac2Session.sessionToken ? ac2Session.sessionToken : '';
        const baseHeaders = extraHeaders || {};
        return token
          ? Object.assign({}, baseHeaders, { Authorization: 'Bearer ' + token })
          : baseHeaders;
      }

      async function requestUploadTicket(file) {
        await ensureAc2Session();

        const response = await fetch(ac2ApiBase + '/api/ac2/upload-ticket', {
          method: 'POST',
          credentials: 'include',
          headers: getAc2AuthHeaders({
            'Content-Type': 'application/json'
          }),
          body: JSON.stringify({
            fileName: file.name || 'avatar.vrm',
            contentType: file.type || DEFAULT_CONTENT_TYPE,
            size: file.size || 0
          })
        });

        if (!response.ok) {
          throw new Error(parseErrorMessage(await response.text(), 'Failed to create upload ticket (' + response.status + ')'));
        }

        return response.json();
      }

      async function finalizeUpload(payload) {
        await ensureAc2Session();

        const response = await fetch(ac2ApiBase + '/api/ac2/finalize-upload', {
          method: 'POST',
          credentials: 'include',
          headers: getAc2AuthHeaders({
            'Content-Type': 'application/json'
          }),
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error(parseErrorMessage(await response.text(), 'Failed to finalize upload (' + response.status + ')'));
        }

        return response.json();
      }

      async function uploadVrmDirect(file, options) {
        const nextOptions = options || {};
        if (!(file instanceof Blob)) {
          throw new Error('Missing VRM file.');
        }

        const ticketResult = await requestUploadTicket(file);
        const upload = ticketResult && ticketResult.upload;
        if (!upload || !upload.url) {
          throw new Error('Upload ticket is missing the signed upload URL.');
        }

        const uploadResult = await uploadToSignedUrl(upload, file, {
          onProgress: nextOptions.onProgress
        });

        const finalizeResult = await finalizeUpload({
          key: ticketResult.key,
          fileName: ticketResult.fileName || file.name || 'avatar.vrm',
          contentType: file.type || DEFAULT_CONTENT_TYPE,
          size: file.size || 0,
          etag: uploadResult.etag || ''
        });

        return Object.assign({}, finalizeResult, {
          key: finalizeResult.key || ticketResult.key,
          fileName: finalizeResult.fileName || ticketResult.fileName || file.name || 'avatar.vrm',
          upload: uploadResult
        });
      }

      async function startAc2Upload(file, options) {
        const nextOptions = options || {};
        if (!(file instanceof File)) {
          throw new Error('Missing VRM file.');
        }

        uploadOverlayState.active = true;
        uploadOverlayState.hidden = false;
        uploadOverlayState.restartIssued = false;
        uploadOverlayState.errorMessage = '';
        uploadOverlayState.fileName = file.name || 'avatar.vrm';
        uploadOverlayState.loadedBytes = 0;
        uploadOverlayState.totalBytes = file.size || 0;
        renderUploadOverlay();
        emitToParent('upload-started', {
          fileName: uploadOverlayState.fileName,
          totalBytes: uploadOverlayState.totalBytes
        });

        try {
          const uploadResult = await uploadVrmDirect(file, {
            onProgress: function (progress) {
              uploadOverlayState.active = true;
              uploadOverlayState.hidden = false;
              uploadOverlayState.loadedBytes = progress.loaded;
              uploadOverlayState.totalBytes = progress.total || file.size || 0;
              renderUploadOverlay();
              emitToParent('upload-progress', {
                fileName: file.name || 'avatar.vrm',
                loadedBytes: progress.loaded,
                totalBytes: progress.total || file.size || 0
              });
            }
          });

          uploadOverlayState.loadedBytes = uploadOverlayState.totalBytes;
          renderUploadOverlay();
          emitToParent('upload-complete', Object.assign({}, uploadResult, {
            totalBytes: uploadOverlayState.totalBytes
          }));
          ensureUploadRuntimeRestarted();
          resetUploadOverlayState();

          if (!nextOptions.suppressClose) {
            requestParentClose({
              reason: 'upload-complete',
              restoreDefaultFrameStyle: true
            });
          }

          return uploadResult;
        } catch (error) {
          uploadOverlayState.active = true;
          uploadOverlayState.hidden = false;
          uploadOverlayState.errorMessage = error && error.message ? error.message : UPLOAD_FAILED_MESSAGE;
          renderUploadOverlay();
          emitToParent('upload-failed', {
            message: uploadOverlayState.errorMessage
          });
          throw error;
        }
      }

      function updateUiMode(uiMode) {
        document.body.dataset.ac2UiMode = uiMode || '';
      }

      function validateHostPayload(payload) {
        if (!payload) {
          return 'Missing init payload.';
        }

        const requiredKeys = ['sessionToken', 'clientId', 'userId', 'exp'];
        for (let index = 0; index < requiredKeys.length; index += 1) {
          const key = requiredKeys[index];
          if (!payload[key]) {
            return 'Missing required field: ' + key;
          }
        }

        return '';
      }

      function markBlocked(reason, detail) {
        emitToParent('blocked', {
          reason: reason || 'access-denied',
          detail: detail || ''
        });
      }

      function emitError(message, detail) {
        emitToParent('error', {
          message: message || 'Unknown error.',
          detail: detail || ''
        });
      }

      function emitExportReady(payload) {
        emitToParent('export-ready', payload || {});
      }

      function emitAvatarCreated(payload) {
        emitToParent('avatar-created', payload || {});
      }

      function normalizeBridgePayload(payload) {
        if (typeof payload !== 'string') {
          return payload || {};
        }

        try {
          return JSON.parse(payload);
        } catch (error) {
          console.warn('Unable to parse AC2 bridge payload JSON.', error);
          return {};
        }
      }

      function isTrustedHostEvent(event) {
        if (!event) {
          return false;
        }

        if (hostSource && event.source && event.source !== hostSource) {
          return false;
        }

        if (hostOrigin !== '*' && event.origin && event.origin !== hostOrigin) {
          return false;
        }

        return true;
      }

      function applyHostInit(message, event) {
        hostSource = event.source || hostSource;
        if (event.origin) {
          hostOrigin = event.origin;
        }

        hostContext = {
          requestId: message.requestId || (hostContext && hostContext.requestId ? hostContext.requestId : null),
          payload: message.payload || {}
        };
        ac2Session = message.payload || ac2Session;
        if (typeof message.payload.apiBase === 'string' && message.payload.apiBase) {
          ac2ApiBase = message.payload.apiBase;
        }

        updateUiMode(message.payload && message.payload.uiMode ? message.payload.uiMode : 'modal');
        applyFrameStyle(message.payload && message.payload.frameStyle ? message.payload.frameStyle : hostFrameStyle);
        onResize();
        if (uploadOverlayState.active) {
          uploadOverlayState.hidden = false;
          renderUploadOverlay();
        }

        const validationError = validateHostPayload(message.payload);
        if (validationError) {
          markBlocked('invalid-init', validationError);
          return;
        }

        notifyParentEvent('init-ack', {
          uiMode: message.payload.uiMode || 'modal',
          locale: message.payload.locale || document.documentElement.lang || 'en',
          frameStyle: getFrameStylePayload(),
          capabilities: {
            uploadVrm: true,
            closeRequest: true,
            exportReadyBridge: true,
            exportUploadBridge: false,
            avatarCreatedBridge: true,
            hostManagedUpload: false,
            selfManagedUpload: true,
            frameStyleBridge: true,
            uiConfigBridge: true
          }
        });

        emitUiConfig();
        emitExternalUploadPanelConfig();

        if (message.payload.autoStart) {
          queueUnityEntry();
        }
      }

      function requestParentClose(payload) {
        if (!getHostMessageTarget()) return;
        emitToParent('close-request', payload || {});
      }

      function handleUploadSelection() {
        const file = uploadVrmInput.files && uploadVrmInput.files[0];
        uploadVrmInput.value = '';

        if (!file) {
          return;
        }

        if (!/\.vrm$/i.test(file.name)) {
          emitToParent('upload-error', {
            message: 'Only .vrm files can be uploaded.'
          });
          return;
        }

        startAc2Upload(file).catch(function (error) {
          console.error(error);
        });
      }

      if (uploadVrmTriggers.length && uploadVrmInput) {
        uploadVrmTriggers.forEach(function (trigger) {
          trigger.addEventListener('click', function () {
            uploadVrmInput.click();
          });
        });

        uploadVrmInput.addEventListener('change', handleUploadSelection);
      }

      creatorCloseRequestButton && creatorCloseRequestButton.addEventListener('click', function () {
        if (uploadOverlayState.active) {
          handleUploadHideRequest();
          return;
        }

        requestParentClose();
      });
      creationConfirmHidePanelButton && creationConfirmHidePanelButton.addEventListener('click', handleUploadHideRequest);

      (() => {
        const slides = Array.prototype.slice.call(document.querySelectorAll('.hero-slide'));
        if (slides.length < 2) return;

        let currentIndex = 0;
        window.setInterval(function () {
          const nextIndex = (currentIndex + 1) % slides.length;
          slides[currentIndex].classList.remove('is-active');
          slides[nextIndex].classList.add('is-active');
          currentIndex = nextIndex;
        }, 5000);
      })();

      startButton.addEventListener('click', queueUnityEntry);
      applyFrameStyle(DEFAULT_HOST_FRAME_STYLE);
      setRevealOrigin();

      window.AC2Bridge = {
        avatarCreated: function (payload) {
          const normalizedPayload = normalizeBridgePayload(payload);
          const file = toVrmFile(normalizedPayload, {
            maxUploadBytes: DEFAULT_MAX_UPLOAD_BYTES
          });

          if (!file) {
            emitError('Missing VRM file.', 'The exported avatar payload could not be converted to a VRM file.');
            return;
          }

          startAc2Upload(file).catch(function (error) {
            console.error(error);
          });
        },
        exportReady: function (payload) {
          emitExportReady(normalizeBridgePayload(payload));
        },
        blocked: markBlocked,
        error: emitError
      };

      function warmFetch(url) {
        return fetch(url, { credentials: 'same-origin' }).then(function (response) {
          if (!response.ok) {
            throw new Error('Failed to preload ' + url + ' (' + response.status + ')');
          }
          return response.arrayBuffer();
        });
      }

      function loadUnityLoaderScript() {
        return new Promise(function (resolve, reject) {
          if (typeof createUnityInstance === 'function') {
            resolve();
            return;
          }

          const existingScript = document.querySelector('script[data-unity-loader="true"]');
          if (existingScript) {
            existingScript.addEventListener('load', resolve, { once: true });
            existingScript.addEventListener('error', reject, { once: true });
            return;
          }

          const script = document.createElement('script');
          script.src = unityLoaderUrl;
          script.async = true;
          script.dataset.unityLoader = 'true';
          script.addEventListener('load', resolve, { once: true });
          script.addEventListener('error', function () {
            reject(new Error('Failed to load Unity loader script.'));
          }, { once: true });
          document.body.appendChild(script);
        });
      }

      function preloadUnityRuntime() {
        if (!unityRuntimePreloadPromise) {
          unityRuntimePreloadPromise = Promise.all([
            loadUnityLoaderScript(),
            warmFetch(unityFrameworkUrl),
            warmFetch(unityCodeUrl)
          ]).then(function () {
            unityRuntimeReady = true;
          }).catch(function (error) {
            console.error(error);
            throw error;
          });
        }

        return unityRuntimePreloadPromise;
      }

      function createUnityPlayer() {
        if (!unityInstancePromise) {
          unityInstancePromise = createUnityInstance(canvasElement, {
            dataUrl: unityDataUrl,
            frameworkUrl: unityFrameworkUrl,
            codeUrl: unityCodeUrl
          }, progressHandler).then(function (instance) {
            unityInstance = instance;
            unityReady = true;
            canvas = instance.Module.canvas;
            loadingBar.style.width = '100%';
            setLoadingStatus(1);
            document.body.classList.add('unity-ready');
            onResize();

            if (enterRequested) {
              enterUnity();
            }

            return instance;
          }).catch(function (error) {
            unityLoadStarted = false;
            unityInstance = null;
            unityInstancePromise = null;
            showLoadingOverlay();
            console.error(error);
            throw error;
          });
        }

        return unityInstancePromise;
      }

      function startUnityLoad() {
        if (unityLoadStarted) return;
        unityLoadStarted = true;

        preloadUnityRuntime().then(function () {
          createUnityPlayer();
        }).catch(function (error) {
          unityLoadStarted = false;
          showLoadingOverlay();
          console.error(error);
        });
      }

      window.addEventListener('resize', onResize);
      window.addEventListener('resize', function () {
        setRevealOrigin();
      });
      window.addEventListener('message', function (event) {
        const message = event.data || {};

        if (!message.type) {
          return;
        }

        if (message.type === 'ac2:init') {
          if (hostOrigin !== '*' && event.origin !== hostOrigin) {
            markBlocked('invalid-origin', 'Rejected init from unexpected origin.');
            return;
          }

          applyHostInit(message, event);
          return;
        }

        if (!isTrustedHostEvent(event)) {
          return;
        }

        if (message.type === 'avatar-creator-reset' || message.type === 'ac2:reset') {
          restartUnityRuntime({
            preserveUploadUi: uploadOverlayState.active
          });
          return;
        }

        if (message.type === 'ac2:upload-started') {
          uploadOverlayState.active = true;
          uploadOverlayState.hidden = false;
          uploadOverlayState.restartIssued = false;
          uploadOverlayState.errorMessage = '';
          uploadOverlayState.fileName = message.payload && message.payload.fileName ? message.payload.fileName : 'avatar.vrm';
          uploadOverlayState.loadedBytes = 0;
          uploadOverlayState.totalBytes = message.payload && Number.isFinite(message.payload.totalBytes)
            ? message.payload.totalBytes
            : 0;
          renderUploadOverlay();
          return;
        }

        if (message.type === 'ac2:upload-progress') {
          uploadOverlayState.active = true;
          uploadOverlayState.loadedBytes = message.payload && Number.isFinite(message.payload.loadedBytes)
            ? message.payload.loadedBytes
            : uploadOverlayState.loadedBytes;
          uploadOverlayState.totalBytes = message.payload && Number.isFinite(message.payload.totalBytes)
            ? message.payload.totalBytes
            : uploadOverlayState.totalBytes;
          if (message.payload && message.payload.fileName) {
            uploadOverlayState.fileName = message.payload.fileName;
          }
          renderUploadOverlay();
          return;
        }

        if (message.type === 'ac2:upload-complete') {
          uploadOverlayState.loadedBytes = uploadOverlayState.totalBytes;
          renderUploadOverlay();
          ensureUploadRuntimeRestarted();
          resetUploadOverlayState();
          requestParentClose({
            reason: 'upload-complete',
            restoreDefaultFrameStyle: true
          });
          return;
        }

        if (message.type === 'ac2:upload-failed') {
          uploadOverlayState.active = true;
          uploadOverlayState.hidden = false;
          uploadOverlayState.errorMessage = UPLOAD_FAILED_MESSAGE;
          renderUploadOverlay();
          return;
        }

        if (message.type === 'ac2:set-ui-mode') {
          updateUiMode(message.payload && message.payload.uiMode ? message.payload.uiMode : 'modal');
          return;
        }

        if (message.type === 'ac2:set-frame-style') {
          applyFrameStyle(message.payload || {});
          onResize();
          notifyParentEvent('frame-style-ack', {
            frameStyle: getFrameStylePayload()
          });
          emitUiConfig();
          return;
        }

        if (message.type === 'ac2:start') {
          queueUnityEntry();
          return;
        }

        if (message.type === 'ac2:close') {
          requestParentClose();
        }
      });
      if (urlParams.get('embedded') === '1') {
        updateUiMode(urlParams.get('uiMode') || 'modal');
      } else if (standaloneConfig && standaloneConfig.uiMode) {
        updateUiMode(standaloneConfig.uiMode);
      }
      if (isEmbedded || getHostMessageTarget()) {
        notifyParentEvent('ready', {
          embedded: isEmbedded,
          path: window.location.pathname,
          uiMode: document.body.dataset.ac2UiMode || urlParams.get('uiMode') || 'modal',
          frameStyle: getFrameStylePayload(),
          capabilities: {
            closeRequest: true,
            frameStyleBridge: true,
            uiConfigBridge: true
          }
        });
        emitUiConfig();
        emitExternalUploadPanelConfig();
      }
      window.addEventListener('load', preloadUnityRuntime, { once: true });
      onResize();
    })();
  </script>
</body>
</html>
